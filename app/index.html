<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rathinam Global University — Main Homepage</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM + Babel (CDN — no install needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { overflow-x: hidden; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: #fff; }

    @keyframes fadeInUp    { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInLeft  { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeInRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes scaleIn     { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
    @keyframes pulse2      { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }
    @keyframes scrollBounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }
    @keyframes textGlow    { 0%,100%{text-shadow:0 0 20px rgba(255,200,50,.5)} 50%{text-shadow:0 0 40px rgba(255,200,50,.9),0 0 80px rgba(255,200,50,.4)} }
    @keyframes videoOverlayPulse { 0%,100%{opacity:.55} 50%{opacity:.48} }
    @keyframes scrollRibbon { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    .hover-lift { transition: transform .3s ease, box-shadow .3s ease; cursor:pointer; }
    .hover-lift:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(0,0,0,.18) !important; }

    @media (max-width: 900px) {
      .schools-grid   { grid-template-columns: repeat(2,1fr) !important; }
      .rgu-way-grid   { grid-template-columns: 1fr !important; }
      .recog-grid     { grid-template-columns: 1fr !important; }
      .footer-grid    { grid-template-columns: 1fr 1fr !important; }
      .chairman-grid  { grid-template-columns: 1fr !important; }
      .spotlight-grid { grid-template-columns: 1fr !important; }
      .life-grid      { grid-template-columns: 1fr 1fr !important; }
      .happen-grid    { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 560px) {
      .schools-grid { grid-template-columns: 1fr 1fr !important; }
      .life-grid    { grid-template-columns: 1fr !important; }
      .footer-grid  { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Colors ─────────────────────────────────────────── */
    const C = {
      navy:"#0d1f4e", blue:"#1a56db", blue2:"#2563eb",
      gold:"#f59e0b", gold2:"#fbbf24", white:"#ffffff",
      light:"#f0f4ff", muted:"#64748b", dark:"#0f172a",
      teal:"#0891b2", emerald:"#059669",
    };

    /* ── useVisible hook ─────────────────────────────────── */
    function useVisible(threshold=0.12){
      const ref = useRef(null);
      const [v,setV] = useState(false);
      useEffect(()=>{
        const obs = new IntersectionObserver(([e])=>{ if(e.isIntersecting) setV(true); },{threshold});
        if(ref.current) obs.observe(ref.current);
        return ()=>obs.disconnect();
      },[]);
      return [ref,v];
    }

    /* ── SectionLabel ────────────────────────────────────── */
    function SectionLabel({children,color=C.blue}){
      return (
        <div style={{display:"inline-flex",alignItems:"center",gap:"10px",marginBottom:"18px"}}>
          <div style={{width:"32px",height:"3px",background:color,borderRadius:"2px"}}/>
          <span style={{fontSize:"12px",fontWeight:"800",color,letterSpacing:"2.5px",textTransform:"uppercase"}}>{children}</span>
          <div style={{width:"32px",height:"3px",background:color,borderRadius:"2px"}}/>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════
       HERO
    ══════════════════════════════════════════════════════ */
    function Hero(){
      const SLIDES=[
        {top:"ADMISSION OPEN 2026",tagline:"Join RGU — Where Readiness Defines Your Future.",sub:"Registration Open for UG and PG Programs",subtag:"Build a career that matters. Apply before seats fill up."},
        {top:"WORLD-CLASS EDUCATION",tagline:"Shaping Innovators. Inspiring Leaders.",sub:"120+ Programs Across 10 Schools",subtag:"From Engineering to Arts — find your perfect program at RGU."},
        {top:"RESEARCH & INNOVATION",tagline:"Where Ideas Meet Impact.",sub:"50+ Research Centres. Real-World Solutions.",subtag:"Join a thriving ecosystem of thinkers, creators, and changemakers."},
      ];
      const [slide,setSlide]=useState(0);
      const [anim,setAnim]=useState(true);

      useEffect(()=>{
        const t=setInterval(()=>{
          setAnim(false);
          setTimeout(()=>{ setSlide(p=>(p+1)%SLIDES.length); setAnim(true); },200);
        },5000);
        return ()=>clearInterval(t);
      },[]);

      const s=SLIDES[slide];

      return (
        <section style={{position:"relative",height:"100vh",minHeight:"620px",overflow:"hidden"}}>
          {/* VIDEO */}
          <video autoPlay muted loop playsInline
            style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",zIndex:0}}>
            <source src="bgvideo.mp4" type="video/mp4"/>
            {/* Fallback gradient if video not found */}
          </video>

          {/* Fallback dark bg (shows behind or if video unavailable) */}
          <div style={{position:"absolute",inset:0,zIndex:0,background:"linear-gradient(135deg,#0d1f4e,#1a2f6e)"}}/>

          {/* Overlay */}
          <div style={{position:"absolute",inset:0,zIndex:1,background:"linear-gradient(110deg,rgba(8,20,70,.82) 0%,rgba(8,20,70,.65) 50%,rgba(8,20,70,.35) 100%)",animation:"videoOverlayPulse 6s ease-in-out infinite"}}/>

          {/* Dot grid */}
          <div style={{position:"absolute",inset:0,zIndex:2,opacity:.06,backgroundImage:"radial-gradient(circle,#fff 1px,transparent 1px)",backgroundSize:"36px 36px"}}/>

          {/* ── TOP BAR ── */}
          <div style={{position:"absolute",top:0,left:0,right:0,zIndex:10,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"22px 36px"}}>
            {/* Logo */}
            <img src="logo.png" alt="RGU Logo"
              style={{height:"64px",objectFit:"contain",filter:"drop-shadow(0 2px 12px rgba(0,0,0,.4))"}}
              onError={e=>{ e.target.style.display="none"; }}
            />
            {/* Fallback text logo */}
            <div style={{display:"flex",alignItems:"center",gap:"10px",position:"absolute",top:"22px",left:"36px"}}>
              <div style={{width:"56px",height:"56px",borderRadius:"14px",background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"18px",color:"#fff",letterSpacing:"-1px",boxShadow:"0 4px 16px rgba(245,158,11,.4)"}}>RGU</div>
              <div style={{display:"flex",flexDirection:"column"}}>
                <span style={{fontWeight:"900",fontSize:"15px",color:"#fff",letterSpacing:"0.5px"}}>RATHINAM GLOBAL</span>
                <span style={{fontSize:"10px",color:"rgba(255,255,255,.65)",letterSpacing:"2px",textTransform:"uppercase"}}>Deemed University</span>
              </div>
            </div>

            {/* Enquiry Button */}
            <a href="#enquiry" style={{padding:"12px 28px",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#fff",borderRadius:"50px",fontWeight:"800",fontSize:"14px",textDecoration:"none",boxShadow:"0 4px 20px rgba(245,158,11,.45)",display:"flex",alignItems:"center",gap:"8px",transition:"all .3s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.05)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";}}
            >📞 Admission Enquiry</a>
          </div>

          {/* ── LEFT MIDDLE ── */}
          <div style={{position:"absolute",left:"36px",top:"50%",transform:"translateY(-50%)",zIndex:10,maxWidth:"580px",opacity:anim?1:0,transition:"opacity .3s ease"}}>
            {/* Badge */}
            <div style={{display:"inline-flex",alignItems:"center",gap:"8px",background:"rgba(245,158,11,.15)",border:"1px solid rgba(245,158,11,.45)",borderRadius:"100px",padding:"6px 18px",marginBottom:"20px",backdropFilter:"blur(8px)"}}>
              <span style={{background:"#f59e0b",color:"#fff",borderRadius:"50px",padding:"2px 10px",fontSize:"11px",fontWeight:"800",letterSpacing:"1px"}}>LIVE</span>
              <span style={{color:"#fde68a",fontSize:"12px",fontWeight:"700",letterSpacing:"1px"}}>{s.top}</span>
            </div>

            <h1 style={{fontSize:"clamp(2.2rem,4vw,3.8rem)",fontWeight:"900",color:"#fff",lineHeight:1.12,marginBottom:"18px",fontFamily:"'Playfair Display',serif",animation:anim?"fadeInLeft .6s ease forwards":"none"}}>
              {s.tagline}
            </h1>

            <div style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.18)",borderRadius:"16px",padding:"20px 24px",marginBottom:"32px",backdropFilter:"blur(12px)"}}>
              <p style={{fontSize:"1.15rem",fontWeight:"700",color:"#fde68a",marginBottom:"8px"}}>{s.sub}</p>
              <p style={{fontSize:".95rem",color:"rgba(255,255,255,.8)",lineHeight:1.6}}>{s.subtag}</p>
            </div>

            {/* Dots */}
            <div style={{display:"flex",gap:"8px",marginBottom:"24px"}}>
              {SLIDES.map((_,i)=>(
                <button key={i} onClick={()=>setSlide(i)} style={{width:i===slide?"36px":"10px",height:"10px",borderRadius:"100px",border:"none",cursor:"pointer",background:i===slide?"#f59e0b":"rgba(255,255,255,.35)",transition:"all .3s"}}/>
              ))}
            </div>
          </div>

          {/* ── BOTTOM LEFT — Apply ── */}
          <div style={{position:"absolute",bottom:"40px",left:"36px",zIndex:10,display:"flex",gap:"16px",flexWrap:"wrap"}}>
            <a href="#programs" style={{padding:"15px 38px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",borderRadius:"50px",fontWeight:"800",fontSize:"15px",textDecoration:"none",boxShadow:"0 6px 28px rgba(37,99,235,.5)",display:"flex",alignItems:"center",gap:"8px",transition:"all .3s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";}}
            >Apply Now →</a>
            <a href="#programs" style={{padding:"15px 26px",background:"rgba(255,255,255,.1)",border:"2px solid rgba(255,255,255,.35)",color:"#fff",borderRadius:"50px",fontWeight:"700",fontSize:"14px",textDecoration:"none",backdropFilter:"blur(8px)",transition:"all .3s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.2)";}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.1)";}}
            >Explore Programs</a>
            <a href="landing.html" style={{padding:"15px 26px",background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"2px solid rgba(255,255,255,.25)",color:"#fff",borderRadius:"50px",fontWeight:"700",fontSize:"14px",textDecoration:"none",boxShadow:"0 6px 24px rgba(245,158,11,.45)",display:"flex",alignItems:"center",gap:"8px",transition:"all .3s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 10px 32px rgba(245,158,11,.6)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 6px 24px rgba(245,158,11,.45)";}}
            >🌐 Explore Full Website</a>
          </div>

          {/* ── BOTTOM RIGHT — Stats card ── */}
          <div style={{position:"absolute",bottom:"40px",right:"36px",zIndex:10,width:"310px"}}>
            <div style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:"20px",padding:"24px",backdropFilter:"blur(16px)",boxShadow:"0 8px 32px rgba(0,0,0,.2)"}}>
              <div style={{display:"flex",gap:"10px",marginBottom:"16px"}}>
                {[{icon:"🎓",label:"25,000+",sub:"Students"},{icon:"🏆",label:"NAAC A++",sub:"Accredited"},{icon:"💼",label:"98%",sub:"Placements"}].map((item,i)=>(
                  <div key={i} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:"20px",marginBottom:"4px"}}>{item.icon}</div>
                    <div style={{fontWeight:"800",color:"#fff",fontSize:"13px"}}>{item.label}</div>
                    <div style={{fontSize:"10px",color:"rgba(255,255,255,.65)"}}>{item.sub}</div>
                  </div>
                ))}
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,.15)",paddingTop:"14px"}}>
                <p style={{color:"#fde68a",fontWeight:"700",fontSize:"13px",marginBottom:"4px"}}>🔴 Admissions Closing Soon</p>
                <p style={{color:"rgba(255,255,255,.75)",fontSize:"12px"}}>Limited seats for 2026 batch. Apply today.</p>
              </div>
            </div>
          </div>

          {/* Scroll indicator */}
          <div style={{position:"absolute",bottom:"40px",left:"50%",transform:"translateX(-50%)",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",color:"rgba(255,255,255,.5)"}}>
            <span style={{fontSize:"11px",letterSpacing:"1.5px",textTransform:"uppercase"}}>Scroll</span>
            <div style={{width:"24px",height:"36px",border:"2px solid rgba(255,255,255,.3)",borderRadius:"12px",display:"flex",justifyContent:"center",paddingTop:"4px"}}>
              <div style={{width:"4px",height:"8px",background:"rgba(255,255,255,.6)",borderRadius:"2px",animation:"scrollBounce 1.6s infinite"}}/>
            </div>
          </div>
        </section>
      );
    }

    /* ══════════════════════════════════════════════════════
       ACCREDITATION RIBBON
    ══════════════════════════════════════════════════════ */
    function Ribbon(){
      const items=["NAAC A++","NBA Accredited","UGC Recognized","AICTE Approved","ISO 9001:2015","NIRF Top 50","QS Ranked","ABET Certified","25,000+ Students","98% Placements"];
      const d=[...items,...items];
      return (
        <div style={{background:C.navy,padding:"14px 0",overflow:"hidden"}}>
          <div style={{display:"flex",gap:"0",width:"max-content",animation:"scrollRibbon 30s linear infinite"}}>
            {d.map((item,i)=>(
              <span key={i} style={{padding:"0 36px",color:"#93c5fd",fontSize:"13px",fontWeight:"700",letterSpacing:".5px",whiteSpace:"nowrap",borderRight:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{color:C.gold}}>✦</span>{item}
              </span>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════
       SCHOOLS
    ══════════════════════════════════════════════════════ */
    const SCHOOLS_DATA=[
      {name:"School of Engineering & Technology",color:"#1a56db",programs:["B.Tech CSE","B.Tech Mech","B.Tech ECE","M.Tech"],emoji:"⚙️"},
      {name:"School of Computing & AI",color:"#7c3aed",programs:["B.Sc CS","M.Sc AI/ML","B.Tech AI","Ph.D CS"],emoji:"🤖"},
      {name:"School of Business & Management",color:"#059669",programs:["MBA","BBA","Executive MBA","PGDM"],emoji:"📊"},
      {name:"School of Health Sciences",color:"#e11d48",programs:["B.Pharm","M.Pharm","B.Sc Nursing","Biotech"],emoji:"🏥"},
      {name:"School of Liberal Arts & Sciences",color:"#d97706",programs:["BA English","B.Sc Physics","MA History","M.Sc Math"],emoji:"📚"},
      {name:"School of Design, Media & Arts",color:"#db2777",programs:["B.Des UI/UX","BA Film","BA Music","M.Des"],emoji:"🎨"},
      {name:"Physiotherapy",color:"#0891b2",programs:["BPT","MPT","Ph.D Physio","Sports PT"],emoji:"🦴"},
      {name:"School of Law & Governance",color:"#1d4ed8",programs:["BA LLB","BBA LLB","LLM","Cyber Law"],emoji:"⚖️"},
      {name:"School of Architecture",color:"#92400e",programs:["B.Arch","M.Arch","Urban Design","Interior"],emoji:"🏛️"},
      {name:"School of Agriculture",color:"#16a34a",programs:["B.Sc Agri","M.Sc Agri","Horticulture","Agribusiness"],emoji:"🌱"},
    ];

    function Schools(){
      const [ref,v]=useVisible(0.08);
      const [hov,setHov]=useState(null);
      return (
        <section id="programs" ref={ref} style={{padding:"100px 40px",background:"#f8faff"}}>
          <div style={{maxWidth:"1280px",margin:"0 auto"}}>
            <div style={{textAlign:"center",marginBottom:"64px",opacity:v?1:0,transform:v?"translateY(0)":"translateY(30px)",transition:"all .7s"}}>
              <SectionLabel>Schools &amp; Programs</SectionLabel>
              <h2 style={{fontSize:"clamp(2rem,3.5vw,3rem)",fontWeight:"900",color:C.navy,marginBottom:"16px"}}>Courses Offered at RGU</h2>
              <p style={{color:C.muted,fontSize:"1.1rem",maxWidth:"600px",margin:"0 auto",lineHeight:1.7}}>Ten world-class schools. Hundreds of programs. One university built to transform your potential into purpose.</p>
            </div>
            <div className="schools-grid" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"20px"}}>
              {SCHOOLS_DATA.map((sc,i)=>(
                <div key={i} className="hover-lift"
                  onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
                  style={{background:hov===i?sc.color:"#fff",borderRadius:"20px",padding:"28px 18px",border:`2px solid ${hov===i?sc.color:"#eef2ff"}`,textAlign:"center",boxShadow:hov===i?`0 20px 48px ${sc.color}40`:"0 4px 20px rgba(0,0,0,.06)",transition:"all .35s",opacity:v?1:0,transform:v?"translateY(0) scale(1)":"translateY(40px) scale(.95)",transitionDelay:`${i*55}ms`}}>
                  <div style={{width:"68px",height:"68px",borderRadius:"18px",background:hov===i?"rgba(255,255,255,.2)":`${sc.color}18`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:"32px",transition:"all .35s"}}>
                    {sc.emoji}
                  </div>
                  <h3 style={{fontSize:"12px",fontWeight:"800",color:hov===i?"#fff":C.navy,lineHeight:1.35,marginBottom:"10px",transition:"color .35s"}}>{sc.name}</h3>
                  <div style={{opacity:hov===i?1:0,transform:hov===i?"translateY(0)":"translateY(8px)",transition:"all .3s"}}>
                    {sc.programs.map((p,j)=>(
                      <div key={j} style={{fontSize:"11px",color:hov===i?"rgba(255,255,255,.85)":C.muted,padding:"2px 0"}}>{p}</div>
                    ))}
                    <a href="#" style={{display:"inline-block",marginTop:"12px",padding:"7px 16px",background:"rgba(255,255,255,.2)",border:"1px solid rgba(255,255,255,.4)",color:"#fff",borderRadius:"50px",fontSize:"11px",fontWeight:"700",textDecoration:"none"}}>Explore →</a>
                  </div>
                </div>
              ))}
            </div>
            <div style={{textAlign:"center",marginTop:"48px",opacity:v?1:0,transition:"opacity .7s .5s"}}>
              <a href="#" style={{display:"inline-flex",alignItems:"center",gap:"10px",padding:"15px 38px",background:`linear-gradient(135deg,${C.blue},${C.navy})`,color:"#fff",borderRadius:"50px",fontWeight:"800",fontSize:"15px",textDecoration:"none",boxShadow:`0 6px 28px ${C.blue}50`,transition:"all .3s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";}}
              >View All 120+ Programs →</a>
            </div>
          </div>
        </section>
      );
    }

    /* ══════════════════════════════════════════════════════
       THE RGU WAY
    ══════════════════════════════════════════════════════ */
    const PILLARS=[
      {icon:"🧠",title:"Academic Rigour",desc:"Curriculum co-designed with industry leaders, blending theory with hands-on application.",color:"#1a56db"},
      {icon:"🚀",title:"Innovation First",desc:"50+ research centres and maker spaces where students turn ideas into real-world solutions.",color:"#7c3aed"},
      {icon:"🌐",title:"Global Perspective",desc:"Partnerships with 80+ universities worldwide, exchange programs, international faculty.",color:"#059669"},
      {icon:"🤝",title:"Industry Connect",desc:"200+ corporate partners for internships, mentorship, live projects, and 98% placements.",color:"#e11d48"},
      {icon:"⚡",title:"Future-Ready Skills",desc:"Every graduate leaves with certifications in AI, cloud, sustainability, and leadership.",color:"#d97706"},
      {icon:"🏆",title:"Excellence Culture",desc:"NAAC A++ accredited. Nationally ranked. Globally recognised. A legacy of high standards.",color:"#0891b2"},
    ];

    function RGUWay(){
      const [ref,v]=useVisible(0.1);
      return (
        <section ref={ref} style={{padding:"100px 40px",background:`linear-gradient(135deg,${C.navy} 0%,#1a2f6e 50%,#0f2557 100%)`,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:"-120px",right:"-120px",width:"500px",height:"500px",borderRadius:"50%",border:"1px solid rgba(255,255,255,.05)"}}/>
          <div style={{position:"absolute",bottom:"-80px",left:"-80px",width:"400px",height:"400px",borderRadius:"50%",border:"1px solid rgba(255,255,255,.04)"}}/>
          <div style={{maxWidth:"1280px",margin:"0 auto",position:"relative",zIndex:1}}>
            <div style={{textAlign:"center",marginBottom:"64px"}}>
              <SectionLabel color={C.gold}>The RGU Way</SectionLabel>
              <h2 style={{fontSize:"clamp(2rem,3.5vw,3.2rem)",fontWeight:"900",color:"#fff",lineHeight:1.15,marginBottom:"16px",opacity:v?1:0,transform:v?"translateY(0)":"translateY(20px)",transition:"all .7s"}}>
                What Makes Rathinam Global
                <span style={{display:"block",color:C.gold2,animation:"textGlow 3s infinite"}}> Different</span>
              </h2>
              <p style={{color:"rgba(255,255,255,.7)",fontSize:"1.1rem",maxWidth:"580px",margin:"0 auto",opacity:v?1:0,transition:"opacity .7s .2s"}}>Six pillars that define our philosophy — and your transformation.</p>
            </div>
            <div className="rgu-way-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"24px"}}>
              {PILLARS.map((p,i)=>(
                <div key={i} className="hover-lift"
                  onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,.1)";e.currentTarget.style.borderColor=`${p.color}80`;}}
                  onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,.06)";e.currentTarget.style.borderColor="rgba(255,255,255,.1)";}}

    /* ══════════════════════════════════════════════════════

    ══════════════════════════════════════════════════════ */
    function FloatingWidget(){
      const [open,setOpen]=useState(false);
      return (
        <>
          <button onClick={()=>setOpen(p=>!p)} style={{position:"fixed",bottom:"32px",right:"32px",zIndex:9000,width:"58px",height:"58px",borderRadius:"50%",background:`linear-gradient(135deg,${C.blue},${C.navy})`,color:"#fff",fontSize:"22px",border:"none",cursor:"pointer",boxShadow:"0 8px 32px rgba(37,99,235,.5)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .3s",animation:"pulse2 2.5s infinite"}}
            onMouseEnter={e=>{e.currentTarget.style.animation="none";e.currentTarget.style.transform="scale(1.1)";}}
            onMouseLeave={e=>{e.currentTarget.style.animation="pulse2 2.5s infinite";e.currentTarget.style.transform="scale(1)";}}
          >{open?"✕":"💬"}</button>

          {open && (
            <div style={{position:"fixed",bottom:"102px",right:"32px",zIndex:8999,width:"290px",background:"#fff",borderRadius:"20px",boxShadow:"0 24px 64px rgba(0,0,0,.2)",overflow:"hidden",animation:"scaleIn .3s ease"}}>
              <div style={{background:`linear-gradient(135deg,${C.navy},${C.blue})`,padding:"20px 24px"}}>
                <h4 style={{color:"#fff",fontWeight:"800",fontSize:"16px",marginBottom:"4px"}}>Admission Enquiry</h4>
                <p style={{color:"rgba(255,255,255,.75)",fontSize:"12px"}}>We reply within 24 hours</p>
              </div>
              <div style={{padding:"20px 24px"}}>
                {["Your Name","Phone Number","Email","Interested Program"].map((ph,i)=>(
                  <input key={i} placeholder={ph} style={{display:"block",width:"100%",padding:"10px 14px",border:"1px solid #e2e8f0",borderRadius:"8px",fontSize:"13px",marginBottom:"10px",outline:"none",fontFamily:"Inter,sans-serif"}}/>
                ))}
                <button style={{width:"100%",padding:"12px",background:`linear-gradient(135deg,${C.blue},${C.navy})`,color:"#fff",border:"none",borderRadius:"8px",fontWeight:"800",fontSize:"14px",cursor:"pointer"}}
                  onMouseEnter={e=>{e.currentTarget.style.opacity=".9";}}
                  onMouseLeave={e=>{e.currentTarget.style.opacity="1";}}
                >Submit Enquiry →</button>
              </div>
            </div>
          )}
        </>
      );
    }

    /* ══════════════════════════════════════════════════════

    function App(){
      return (

          <LifeSection/>
          <Spotlight/>
          <Chairman/>

          <Footer/>
          <FloatingWidget/>

    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
